<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#16213e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="description" content="A mobile-first soccer coaching tactical board for creating formations, plays, and animated drills. Share diagrams with players via short links." />
    <title>CoachingBoard</title>
    <style>
      :root {
        /* Primitives */
        --pt-color-navy-900: #1a1a2e;
        --pt-color-navy-800: #16213e;
        --pt-color-navy-700: #0f3460;
        --pt-color-navy-600: #1c3a5c;
        --pt-color-navy-500: #1a4a7a;
        --pt-color-gray-900: #151515;
        --pt-color-gray-800: #222222;
        --pt-color-gray-700: #333;
        --pt-color-gray-600: #495057;
        --pt-color-gray-500: #555;
        --pt-color-gray-400: #6c757d;
        --pt-color-gray-350: #808589;
        --pt-color-gray-300: #999;
        --pt-color-gray-250: #aaa;
        --pt-color-gray-200: #adb5bd;
        --pt-color-gray-150: #bbb;
        --pt-color-gray-100: #ccc;
        --pt-color-gray-75: #ddd;
        --pt-color-gray-50: #e0e0e0;
        --pt-color-gray-25: #eee;
        --pt-color-gray-10: #f0f0f0;
        --pt-color-white: #ffffff;
        --pt-color-black: #222222;
        --pt-color-blue-600: #2563eb;
        --pt-color-blue-700: #1d4ed8;
        --pt-color-blue-400: #4ea8de;
        --pt-color-blue-300: #83c2e8;
        --pt-color-blue-500: #3a8fc4;
        --pt-color-blue-450: #2e86c1;
        --pt-color-blue-200: #00bfff;
        --pt-color-blue-250: #0099d6;
        --pt-color-red-500: #e94560;
        --pt-color-red-600: #d13350;
        --pt-color-red-400: #d43d55;
        --pt-color-red-350: #c4233a;
        --pt-color-red-300: #e17788;
        --pt-color-red-250: #e87da0;
        --pt-color-red-200: #f87171;
        --pt-color-red-150: #fb8a8a;
        --pt-color-green-600: #16a34a;
        --pt-color-green-700: #15803d;
        --pt-color-green-800: #116b33;
        --pt-color-green-200: #86efac;
        --pt-color-green-500: #2d6a4f;
        --pt-color-green-550: #276749;
        --pt-color-yellow-400: #f0c040;
        --pt-color-yellow-500: #d4a830;
        --pt-color-yellow-300: #f5d379;
        --pt-color-yellow-200: #ffd166;
        --pt-color-yellow-100: #fef3c7;
        --pt-color-yellow-450: #c9a020;
        --pt-color-yellow-550: #b8940a;
        --pt-color-purple-600: #7b2d8e;
        --pt-color-purple-300: #a36cb0;
        --pt-color-chartreuse-400: #7fff00;
        --pt-color-chartreuse-500: #5cb800;
        --pt-color-orange-400: #ff6b1a;
        --pt-color-pink-400: #ff3ea5;

        /* Semantic – App chrome */
        --pt-bg-body: var(--pt-color-navy-900);
        --pt-bg-primary: var(--pt-color-navy-800);
        --pt-bg-surface: var(--pt-color-navy-700);
        --pt-bg-dark: var(--pt-color-gray-900);
        --pt-bg-toolbar: var(--pt-color-navy-600);
        --pt-bg-warning: var(--pt-color-yellow-100);
        --pt-bg-inverted: var(--pt-color-white);         /* light surface for inverted/contrast UI elements */

        --pt-border: var(--pt-color-navy-500);
        --pt-border-ui: rgba(255, 255, 255, 0.35);
        --pt-border-on-inverted: var(--pt-color-navy-500); /* border/hover on a light inverted surface */

        /* Semantic – Text */
        --pt-text: var(--pt-color-gray-50);
        --pt-text-muted: var(--pt-color-gray-250);
        --pt-text-on-light: var(--pt-color-gray-500);
        --pt-text-white: var(--pt-color-white);
        --pt-text-on-inverted: var(--pt-color-navy-900);  /* dark text for use on --pt-bg-inverted surfaces */

        /* Semantic – Accent */
        --pt-accent: var(--pt-color-blue-400);
        --pt-accent-hover: var(--pt-color-blue-500);

        /* Semantic – Danger */
        --pt-danger: var(--pt-color-red-500);
        --pt-danger-hover: var(--pt-color-red-600);
        --pt-danger-light: var(--pt-color-red-200);
        --pt-danger-lightest: var(--pt-color-red-150);

        /* Semantic – Success */
        --pt-success: var(--pt-color-green-600);
        --pt-success-hover: var(--pt-color-green-700);
        --pt-success-light: var(--pt-color-green-200);
        --pt-success-btn-hover: var(--pt-color-green-800);

        /* Semantic – Warning */
        --pt-warning: var(--pt-color-yellow-400);
        --pt-warning-hover: var(--pt-color-yellow-500);

        /* Semantic – Buttons */
        --pt-btn-primary: var(--pt-color-blue-600);
        --pt-btn-primary-hover: var(--pt-color-blue-700);

        /* Semantic – Field */
        --pt-field-stripe-light: var(--pt-color-green-500);
        --pt-field-stripe-dark: var(--pt-color-green-550);
        --pt-field-bg-white: var(--pt-color-white);
        --pt-field-area-white: var(--pt-color-gray-10);
        --pt-field-line-white: var(--pt-color-gray-150);
        --pt-field-net-white: var(--pt-color-gray-300);
        --pt-field-text-white: var(--pt-color-black);
        --pt-field-sel-white: var(--pt-color-blue-600);

        /* Semantic – Annotation */
        --pt-annotation: var(--pt-color-yellow-200);
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        height: 100%;
        background: var(--pt-bg-body);
        color: var(--pt-text);
        font-family: system-ui, -apple-system, sans-serif;
      }

      body {
        min-height: 100%;
        overflow: hidden;
        overscroll-behavior: none;
      }

      coach-board {
        width: 100%;
      }

      @media print {
        html, body, main {
          background: white !important;
          color-scheme: light !important;
        }
      }
    </style>
    <script type="module" src="/src/index.ts"></script>
  </head>
  <body>

      </svg>
    </div>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1c3a5c;
        animation: splashBg 2.4s ease-in-out forwards;
      }
      #splash-icon {
        width: 64px;
        height: auto;
        opacity: 0;
        animation: splashIcon 2.4s ease-in-out forwards;
      }
      @keyframes splashIcon {
        0%    { opacity: 0; transform: scale(1); }
        21%   { opacity: 0; transform: scale(1); }
        33%   { opacity: 1; transform: scale(1.5); }
        75%   { opacity: 1; transform: scale(1.5); }
        90%   { opacity: 0; transform: scale(10); }
        100%  { opacity: 0; transform: scale(10); }
      }
      @keyframes splashBg {
        0%    { background: #1c3a5c; opacity: 1; }
        75%   { background: #1c3a5c; opacity: 1; }
        90%   { opacity: 0; }
        100%  { opacity: 0; pointer-events: none; }
      }
      #splash.done { display: none; }
    </style>
    <script>
      document.getElementById('splash').addEventListener('animationend', function(e) {
        if (e.target === this) this.classList.add('done');
      });
    </script>
    <main><coach-board></coach-board></main>
  </body>
</html>
